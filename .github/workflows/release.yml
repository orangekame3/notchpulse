name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .app bundle
        run: make app

      - name: Create archive
        run: make archive

      - name: Calculate SHA256
        id: sha256
        run: |
          SHA=$(shasum -a 256 ".build/NotchPulse-${{ steps.version.outputs.version }}-arm64.tar.gz" | awk '{print $1}')
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            .build/NotchPulse-${{ steps.version.outputs.version }}-arm64.tar.gz

      - name: Update Homebrew Tap
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha256.outputs.sha256 }}
        run: |
          git clone "https://x-access-token:${GH_PAT}@github.com/orangekame3/homebrew-tap.git" /tmp/homebrew-tap
          mkdir -p /tmp/homebrew-tap/Casks

          cat > /tmp/homebrew-tap/Casks/notchpulse.rb << 'CASK'
          cask "notchpulse" do
            version "VERSION_PLACEHOLDER"
            sha256 "SHA256_PLACEHOLDER"

            url "https://github.com/orangekame3/notchpulse/releases/download/v#{version}/NotchPulse-#{version}-arm64.tar.gz"
            name "NotchPulse"
            desc "System monitor that extends your MacBook's notch"
            homepage "https://github.com/orangekame3/notchpulse"

            depends_on macos: ">= :ventura"
            depends_on arch: :arm64

            app "NotchPulse.app"

            postflight do
              system_command "/usr/bin/xattr",
                             args: ["-cr", "#{appdir}/NotchPulse.app"],
                             sudo: false
            end

            zap trash: [
              "~/Library/Preferences/com.orangekame3.NotchCPUMonitor.plist",
            ]
          end
          CASK

          sed -i '' "s/VERSION_PLACEHOLDER/${VERSION}/" /tmp/homebrew-tap/Casks/notchpulse.rb
          sed -i '' "s/SHA256_PLACEHOLDER/${SHA256}/" /tmp/homebrew-tap/Casks/notchpulse.rb

          cd /tmp/homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/notchpulse.rb
          git diff --cached --quiet || git commit -m "Update notchpulse to ${VERSION}"
          git push
